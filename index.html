window.renderBeltCategoryDetail = function(memberId){
  const catId = document.getElementById('beltCategorySelect').value;
  const container = document.getElementById('beltCategoryDetail');
  if(!catId){ container.innerHTML = ''; return; }
  const cat = BALANZ_LEVELS.categories.find(c => String(c.id) === String(catId));
  if(!cat) return;
  const m = members.find(x => x.id === memberId);
  const gender = (m && m.gender) || 'm';

  const history = viewedMemberTests.filter(t => t.label === cat.name).sort((a,b) => a.date.localeCompare(b.date));
  const latest = history[history.length - 1];
  const currentColor = latest ? (latest.value || '').trim().split(' ')[0].toLowerCase() : null;

  const rows = cat.levels.map(lvl => {
    const isCurrent = currentColor === lvl.color;
    const subs = lvl.sublevels || [];
    // Toon de 4 sub-niveaus als compacte "1: … · 2: … · 3: … · 4: …" reeks.
    const subTargets = [1,2,3,4].map(n => {
      const s = subs.find(x => x.n === n);
      const t = s ? (gender === 'v' ? s.target_v : s.target_m) : (gender === 'v' ? lvl.target_v : lvl.target_m);
      return `<span style="white-space:nowrap;"><span style="color:var(--muted);">${n}:</span> ${escapeHtml(t)}</span>`;
    }).join('<span style="color:var(--line);"> · </span>');
    return `<tr style="${isCurrent ? 'background:rgba(214,213,62,0.10);' : ''}">
      <td style="vertical-align:top;"><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:${BALANZ_LEVELS.color_hex[lvl.color]}; margin-right:7px; box-shadow:inset 0 0 0 1px rgba(0,0,0,.3);"></span>${BALANZ_LEVELS.color_labels[lvl.color]}</td>
      <td style="vertical-align:top;">${escapeHtml(lvl.exercise)}</td>
      <td class="mono" style="font-size:11px; line-height:1.7;">${subTargets}</td>
    </tr>`;
  }).join('');

  const subOptions = cat.levels.map(lvl => {
    const label = BALANZ_LEVELS.color_labels[lvl.color];
    return [1,2,3,4].map(s => {
      const sub = (lvl.sublevels || []).find(x => x.n === s);
      const subTarget = sub ? (gender === 'v' ? sub.target_v : sub.target_m) : (gender === 'v' ? lvl.target_v : lvl.target_m);
      return `<option value="${label} ${s}">${label} ${s} &mdash; ${lvl.exercise} (${subTarget})</option>`;
    }).join('');
  }).join('');

  container.innerHTML = `
    ${latest
      ? `<div class="hint" style="margin-top:0;">Huidig niveau: <strong style="color:var(--amber);">${escapeHtml(latest.value)}</strong> (${formatDate(latest.date)}${latest.note ? ' &middot; ' + escapeHtml(latest.note) : ''})</div>`
      : `<div class="hint" style="margin-top:0;">Nog geen resultaat geregistreerd voor deze categorie.</div>`}
    <table style="margin:12px 0 16px;">
      <tr><th>Niveau</th><th>Oefening</th><th>Doel (${gender === 'v' ? 'vrouw' : 'man'})</th></tr>
      ${rows}
    </table>
    <div class="hint" style="margin-top:0; margin-bottom:16px;">&#127937; Eindpunt: ${escapeHtml(cat.skill_endpoint)}</div>
    <form onsubmit="handleLogBeltLevel(event,'${memberId}','${cat.name.replace(/'/g,"\'")}')" class="inline-form">
      <div class="field" style="min-width:280px;">
        <label>Behaald sub-niveau</label>
        <select id="beltSubNiveau" required>
          <option value="">Kies...</option>
          ${subOptions}
        </select>
      </div>
      <div class="field" style="min-width:120px;"><label>Datum</label><input id="beltTestDate" type="date" value="${todayStr()}"></div>
      <div class="field" style="min-width:160px;"><label>Concreet resultaat (optioneel)</label><input id="beltTestNote" type="text" placeholder="Bijv. 14 reps"></div>
      <button class="btn small" type="submit">Registreren</button>
    </form>
  `;
};

window.handleLogBeltLevel = async function(e, memberId, categoryName){
  e.preventDefault();
  const value = document.getElementById('beltSubNiveau').value;
  const date = document.getElementById('beltTestDate').value || todayStr();
  const typedNote = document.getElementById('beltTestNote').value.trim();
  if(!value) return;

  // De opgeslagen notitie bevat altijd de concrete oefening, zodat het lid
  // nooit enkel "Groen 3" te zien krijgt zonder context.
  const cat = BALANZ_LEVELS.categories.find(c => c.name === categoryName);
  const colorKey = value.trim().split(' ')[0].toLowerCase();
  const lvl = cat ? cat.levels.find(l => l.color === colorKey) : null;
  const exerciseLabel = lvl ? lvl.exercise : '';
  const note = exerciseLabel ? (typedNote ? `${exerciseLabel} — ${typedNote}` : exerciseLabel) : typedNote;

  const { error } = await sb.from('tests').insert({ member_id: memberId, label: categoryName, value, unit: '', note, date });
  if(error){ showToast('Registreren mislukt: ' + error.message); return; }
  await loadMemberDetail(memberId);
  render();
  showToast(`Niveau geregistreerd: ${value}`);
};

window.handleSetMemberGender = async function(memberId, gender){
  if(!gender) return;
  const prevCategory = document.getElementById('beltCategorySelect')?.value || '';
  const { data, error } = await sb.from('profiles').update({ gender }).eq('id', memberId).select().single();
  if(error){ showToast('Opslaan mislukt: ' + error.message); return; }
  const idx = members.findIndex(x => x.id === memberId);
  if(idx > -1) members[idx] = data;
  // Herrender enkel de niveau-kaart in place, zodat de doelen meteen kloppen
  // en de gekozen categorie niet verloren gaat.
  const wrap = document.getElementById('balanzLevelCardWrap');
  if(wrap){
    wrap.innerHTML = renderBalanzLevelCard(data);
    if(prevCategory){
      const sel = document.getElementById('beltCategorySelect');
      if(sel){ sel.value = prevCategory; window.renderBeltCategoryDetail(memberId); }
    }
  } else {
    render();
  }
};

function countNewPRsThisMonth(tests){
  const month = todayStr().slice(0,7);
  const byLabel = {};
  tests.forEach(t => { (byLabel[t.label] = byLabel[t.label]||[]).push(t); });
  let count = 0;
  Object.entries(byLabel).forEach(([label, arr]) => {
    const sorted = [...arr].sort((a,b)=> a.date.localeCompare(b.date));
    const direction = getDirection(label, sorted[0]?.unit);
    let best = null;
    sorted.forEach(t => {
      const v = parseFloat(t.value);
      if(isNaN(v)) return;
      const isRecord = best === null || (direction === 'hoger' ? v > best : v < best);
      if(isRecord){
        best = v;
        if(t.date.slice(0,7) === month) count++;
      }
    });
  });
  return count;
}

window.exportSignupsCSV = async function(){
  const month = document.getElementById('exportMonth').value; // "2026-07"
  if(!month) return;
  const monthClasses = classes.filter(c => c.date.slice(0,7) === month);
  if(monthClasses.length === 0){ showToast('Geen lessen gevonden in die maand.'); return; }
  if(Object.keys(allSignups).length === 0) await loadAllSignups();
  if(members.length === 0) await loadMembers();

  let rows = [['Les','Datum','Uur','Locatie','Lid naam','Lid e-mail']];
  monthClasses.sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time)).forEach(c => {
    const ids = allSignups[c.id] || [];
    if(ids.length === 0){
      rows.push([c.name, formatDate(c.date), (c.time||'').slice(0,5), c.location||'', '', '']);
    } else {
      ids.forEach(mid => {
        const m = members.find(x=>x.id===mid);
        rows.push([c.name, formatDate(c.date), (c.time||'').slice(0,5), c.location||'', m?m.name:'?', m?m.email:'']);
      });
    }
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `deelnemers-${month}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

function buildLineChart(sorted){
  const pts = sorted.map(t => ({ date: t.date, v: parseFloat(t.value) })).filter(p => !isNaN(p.v));
  if(pts.length < 2) return '';
  const width = 320, height = 130, padX = 14, padY = 18;
  let minV = Math.min(...pts.map(p=>p.v));
  let maxV = Math.max(...pts.map(p=>p.v));
  if(minV === maxV){ minV -= 1; maxV += 1; }
  const xStep = (width - padX*2) / (pts.length - 1);
  const coords = pts.map((p,i) => {
    const x = padX + i*xStep;
    const y = height - padY - ((p.v - minV)/(maxV - minV)) * (height - padY*2);
    return { x, y, v: p.v, date: p.date };
  });
  const pathD = coords.map((c,i) => (i===0?'M':'L') + c.x.toFixed(1) + ',' + c.y.toFixed(1)).join(' ');
  const areaD = pathD + ` L${coords[coords.length-1].x.toFixed(1)},${height-padY} L${coords[0].x.toFixed(1)},${height-padY} Z`;
  const circles = coords.map(c => `<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="3.5" fill="var(--amber)" stroke="var(--ink-2)" stroke-width="1.5"><title>${escapeHtml(formatDate(c.date))}: ${escapeHtml(String(c.v))}</title></circle>`).join('');
  return `
    <svg viewBox="0 0 ${width} ${height+16}" style="width:100%; height:auto; display:block; margin-top:10px;">
      <line x1="${padX}" y1="${height-padY}" x2="${width-padX}" y2="${height-padY}" stroke="var(--line)" stroke-width="1"/>
      <path d="${areaD}" fill="rgba(214,213,62,0.12)" stroke="none"/>
      <path d="${pathD}" fill="none" stroke="var(--amber)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${circles}
      <text x="${padX}" y="${height+12}" fill="var(--muted)" font-size="10" font-family="IBM Plex Mono, monospace">${escapeHtml(formatDate(coords[0].date))}</text>
      <text x="${width-padX}" y="${height+12}" fill="var(--muted)" font-size="10" font-family="IBM Plex Mono, monospace" text-anchor="end">${escapeHtml(formatDate(coords[coords.length-1].date))}</text>
    </svg>`;
}

function getDirection(label, unit){
  const g = goals[label];
  if(g) return g.direction;
  const u = (unit||'').toLowerCase();
  if(u.includes('min') || u.includes('sec') || u.includes('u')) return 'lager';
  return 'hoger';
}

function renderScoreboard(label, arr, memberId, trainerView){
  const sorted = [...arr].sort((a,b)=> a.date.localeCompare(b.date));
  const latest = sorted[sorted.length-1];
  const prev = sorted[sorted.length-2];
  let deltaHtml = '';
  if(prev){
    const diff = parseFloat(latest.value) - parseFloat(prev.value);
    if(!isNaN(diff)) deltaHtml = `<span class="delta ${diff<0?'neg':''}">${diff>0?'+':''}${diff.toFixed(1)}</span>`;
  }
  const chart = buildLineChart(sorted);
  const direction = getDirection(label, latest.unit);
  const numericValues = sorted.map(t=>parseFloat(t.value)).filter(v=>!isNaN(v));
  const bestValue = numericValues.length ? (direction === 'hoger' ? Math.max(...numericValues) : Math.min(...numericValues)) : null;
  const latestIsPR = bestValue !== null && parseFloat(latest.value) === bestValue && sorted.length > 1;
  const goal = goals[label];
  let goalHtml = '';
  if(goal){
    const lv = parseFloat(latest.value);
    const tv = parseFloat(goal.target_value);
    let pct = 0;
    if(!isNaN(lv) && !isNaN(tv)){
      if(goal.direction === 'hoger'){
        const startEstimate = numericValues.length ? Math.min(...numericValues) : lv;
        pct = tv === startEstimate ? 100 : Math.max(0, Math.min(100, ((lv - startEstimate) / (tv - startEstimate)) * 100));
      } else {
        const startEstimate = numericValues.length ? Math.max(...numericValues) : lv;
        pct = startEstimate === tv ? 100 : Math.max(0, Math.min(100, ((startEstimate - lv) / (startEstimate - tv)) * 100));
      }
    }
    const reached = (goal.direction === 'hoger' && lv >= tv) || (goal.direction === 'lager' && lv <= tv);
    goalHtml = `
      <div style="margin-top:12px; padding-top:12px; border-top:1px solid var(--line);">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:5px;">
          <span>Doel: ${escapeHtml(goal.target_value)} ${escapeHtml(latest.unit||'')}</span>
          <span>${reached ? '🎯 Doel bereikt!' : Math.round(pct)+'%'}</span>
        </div>
        <div style="background:var(--ink-2); border-radius:6px; height:8px; overflow:hidden;">
          <div style="background:${reached?'var(--teal)':'var(--amber)'}; height:100%; width:${Math.round(pct)}%; transition:width .3s ease;"></div>
        </div>
        ${trainerView || !trainerView ? `<button class="btn ghost small" style="margin-top:8px;" onclick="removeGoal('${memberId}','${escapeHtml(label)}')">Doel verwijderen</button>` : ''}
      </div>`;
  } else {
    goalHtml = `
      <div style="margin-top:12px; padding-top:12px; border-top:1px solid var(--line);">
        <button class="btn ghost small" onclick="showGoalForm('${memberId}','${escapeHtml(label).replace(/'/g,"\\'")}')">+ Doel instellen</button>
        <div id="goalForm-${memberId}-${label.replace(/[^a-zA-Z0-9]/g,'')}"></div>
      </div>`;
  }

  return `
    <div class="scoreboard">
      <div class="label">${escapeHtml(label)} ${latestIsPR ? `<span style="color:var(--amber); font-size:11.5px; font-weight:700;">🏆 PR</span>` : ''}</div>
      <div class="big">
        <span class="val">${escapeHtml(latest.value)}</span>
        <span class="unit">${escapeHtml(latest.unit||'')}</span>
        ${deltaHtml}
      </div>
      <div class="date">Laatst gemeten op ${formatDate(latest.date)}${latest.note? ' · '+escapeHtml(latest.note):''}</div>
      ${chart || (sorted.length===1 ? `<div class="hint">Nog maar 1 meting — de grafiek verschijnt vanaf de tweede meting.</div>` : '')}
      ${trainerView || sorted.length>1 ? `
      <table style="margin-top:12px;">
        <tr><th>Datum</th><th>Waarde</th>${trainerView?'<th></th>':''}</tr>
        ${sorted.slice().reverse().map(t=>`<tr><td>${formatDate(t.date)}</td><td class="mono">${escapeHtml(t.value)} ${escapeHtml(t.unit||'')}</td>${trainerView?`<td style="text-align:right;"><button class="btn ghost small" onclick="deleteTest('${memberId}','${t.id}')">Verwijder</button></td>`:''}</tr>`).join('')}
      </table>` : ''}
      ${goalHtml}
    </div>`;
}

function beltBarHTML(currentColorKey, currentSub){
  return `<div class="belt-bar">${BALANZ_LEVELS.colors.map(c=>{
    const isCurrent = c === currentColorKey;
    const stripes = [1,2,3,4].map(i=>{
      const filled = isCurrent && i <= currentSub;
      return `<span class="belt-stripe ${filled?'filled':''}"></span>`;
    }).join('');
    return `<div class="belt-seg ${isCurrent?'belt-seg-current':''}" style="background:${BALANZ_LEVELS.color_hex[c]}">${stripes}</div>`;
  }).join('')}</div>`;
}

function parseBeltValue(value){
  const parts = (value||'').trim().split(' ');
  return { colorKey: (parts[0]||'').toLowerCase(), sub: parseInt(parts[1],10) || 0 };
}

/* Belt-tests (Balanz niveausysteem) tonen kleur + subniveau + concrete oefening,
   in plaats van de generieke numerieke scoreboard-weergave (die niet past bij
   waarden zoals "Groen 3"). Zichtbaar voor trainer én lid. */
function renderBeltScoreboard(cat, arr, memberId, trainerView, gender){
  const sorted = [...arr].sort((a,b)=> a.date.localeCompare(b.date));
  const latest = sorted[sorted.length-1];
  const { colorKey, sub } = parseBeltValue(latest.value);
  const lvl = cat.levels.find(l => l.color === colorKey);
  const colorLabel = BALANZ_LEVELS.color_labels[colorKey] || latest.value;
  const exercise = lvl ? lvl.exercise : '';
  let detailNote = latest.note || '';
  if(exercise && detailNote.startsWith(exercise)){
    detailNote = detailNote.slice(exercise.length).replace(/^\s*[—-]\s*/, '');
  }

  // Concrete doelwaarde van het huidige sub-niveau
  const subTargetOf = (lv, n) => {
    if(!lv) return '';
    const s = (lv.sublevels || []).find(x => x.n === n);
    if(s) return gender === 'v' ? s.target_v : s.target_m;
    return gender === 'v' ? lv.target_v : lv.target_m;
  };
  const currentSubTarget = subTargetOf(lvl, sub || 1);

  const curIdx = lvl ? cat.levels.findIndex(l => l.color === colorKey) : -1;
  let nextHint = '';
  if(lvl){
    if(sub < 4){
      const nextT = subTargetOf(lvl, sub+1);
      nextHint = `Volgende: ${colorLabel} ${sub+1} — ${exercise} (${nextT}).`;
    } else if(curIdx > -1 && curIdx < cat.levels.length-1){
      const nl = cat.levels[curIdx+1];
      const nlT = subTargetOf(nl, 1);
      nextHint = `Volgende: ${BALANZ_LEVELS.color_labels[nl.color]} 1 — ${nl.exercise} (${nlT}).`;
    } else {
      nextHint = `Topniveau bereikt in deze categorie: ${cat.skill_endpoint}.`;
    }
  }

  return `
    <div class="scoreboard">
      <div class="label">${escapeHtml(cat.name)}</div>
      ${beltBarHTML(colorKey, sub)}
      <div class="big" style="margin-top:10px;">
        <span class="val" style="color:${BALANZ_LEVELS.color_hex[colorKey] || 'var(--amber)'};">${escapeHtml(colorLabel)}${sub?' '+sub:''}</span>
      </div>
      ${exercise ? `<div class="hint" style="margin-top:2px; margin-bottom:0;">Behaald: <strong>${escapeHtml(exercise)}</strong>${currentSubTarget ? ' — ' + escapeHtml(currentSubTarget) : ''}${detailNote ? ' — '+escapeHtml(detailNote) : ''}</div>` : ''}
      <div class="date">Laatst gemeten op ${formatDate(latest.date)}</div>
      ${nextHint ? `<div class="hint" style="margin-top:8px; padding-top:8px; border-top:1px dashed var(--line);">${escapeHtml(nextHint)}</div>` : ''}
      ${trainerView || sorted.length>1 ? `
      <table style="margin-top:12px;">
        <tr><th>Datum</th><th>Niveau</th>${trainerView?'<th></th>':''}</tr>
        ${sorted.slice().reverse().map(t=>`<tr><td>${formatDate(t.date)}</td><td class="mono">${escapeHtml(t.value)}</td>${trainerView?`<td style="text-align:right;"><button class="btn ghost small" onclick="deleteTest('${memberId}','${t.id}')">Verwijder</button></td>`:''}</tr>`).join('')}
      </table>` : ''}
    </div>`;
}

/* Kiest automatisch de juiste weergave: belt-scoreboard voor Balanz-categorieen,
   anders de bestaande generieke (numerieke) scoreboard. */
function renderTestCard(label, arr, memberId, trainerView, gender){
  const cat = BALANZ_LEVELS.categories.find(c => c.name === label);

}

window.handleSetGoal = async function(e, memberId, label){
  e.preventDefault();

/* ---------------- PR-TIJDLIJN ---------------- */
/* Verzamelt alle momenten waarop een lid een nieuw persoonlijk record neerzette,
   zowel voor de vrije testen (renderScoreboard, richting via getDirection) als
   voor de Balanz-testbatterij (kleur/sub-niveau hoger dan ooit voorheen). */
function computePRTimeline(tests){
  const byLabel = {};
  (tests||[]).forEach(t => { (byLabel[t.label] = byLabel[t.label]||[]).push(t); });

  const events = [];
  Object.entries(byLabel).forEach(([label, arr]) => {
    const sorted = [...arr].sort((a,b)=> a.date.localeCompare(b.date));
    const cat = BALANZ_LEVELS.categories.find(c => c.name === label);

    if(cat){
      // Testbatterij: PR = hoger kleur/sub-niveau dan ooit voorheen voor deze categorie
      let best = -1;
      sorted.forEach(t => {
        const parts = (t.value||'').trim().split(' ');
        const colorIdx = BADGE_COLOR_ORDER.indexOf((parts[0]||'').toLowerCase());
        const sub = parseInt(parts[1],10) || 0;
        const rank = colorIdx * 10 + sub;
        if(colorIdx >= 0 && rank > best){
          if(best >= 0) events.push({ date: t.date, label, value: t.value, kind:'belt' });
          best = rank;
        }
      });
    } else {
      // Vrije test: PR = beste numerieke waarde tot dan toe, richting via getDirection
      const dir = getDirection(label, sorted[0]?.unit);
      let best = null;
      sorted.forEach(t => {
        const v = parseFloat(String(t.value).replace(',','.'));
        if(isNaN(v)) return;
        const isPR = best === null ? false : (dir === 'lager' ? v < best : v > best);
        if(best === null){ best = v; return; }
        if(isPR){ events.push({ date: t.date, label, value: t.value, unit: t.unit, kind:'numeric' }); best = v; }
      });
    }
  });

  events.sort((a,b)=> b.date.localeCompare(a.date));
  return events;
}

  return `

      <input id="recipeSearchInput" type="text" placeholder="Zoek op titel, auteur of ingrediënt..." value="${escapeHtml(recipeSearchQuery)}" oninput="setRecipeSearch(this.value)">
    </div>

    ${filteredRecipes.length === 0 ? `<div class="empty"><div class="display">${q ? 'Geen resultaten' : 'Nog geen recepten'}</div>${q ? 'Probeer een andere zoekterm.' : 'Wees de eerste om er een te delen!'}</div>` : filteredRecipes.map(r => {
      const canEdit = r.author_id === profile.id;
      const canDelete = canEdit || isTrainer;
      if(editingRecipeId === r.id){
        return `
        <div class="info-post">
          <form onsubmit="handleUpdateRecipe(event,'${r.id}')">
            <div class="field"><label>Titel</label><input id="editTitle-${r.id}" type="text" value="${escapeHtml(r.title)}" required></div>
            <div class="field"><label>Ingrediënten</label><textarea id="editIngredients-${r.id}" rows="4" required>${escapeHtml(r.ingredients)}</textarea></div>
            <div class="field"><label>Bereiding</label><textarea id="editInstructions-${r.id}" rows="4" required>${escapeHtml(r.instructions)}</textarea></div>
            <div style="display:flex; gap:8px;">
              <button class="btn small" type="submit">Opslaan</button>
              <button class="btn ghost small" type="button" onclick="cancelEditRecipe()">Annuleren</button>
            </div>
          </form>
        </div>`;
      }
      return `
      <div class="info-post">
        <h3>${escapeHtml(r.title)}</h3>
        <div class="date" style="display:flex; align-items:center; gap:8px;">
          ${avatarFor({id:r.author_id, name:r.author_name, avatar_seed: avatarSeeds[r.author_id]}, 24)}
          <span>Door ${escapeHtml(r.author_name)} · ${formatDate(r.created_at.slice(0,10))}</span>
        </div>
        <div style="margin-bottom:10px;">
          <div style="font-weight:600; font-size:13px; color:var(--chalk-dim); margin-bottom:4px;">Ingrediënten</div>
          <p>${escapeHtml(r.ingredients)}</p>
        </div>
        <div>
          <div style="font-weight:600; font-size:13px; color:var(--chalk-dim); margin-bottom:4px;">Bereiding</div>
          <p>${escapeHtml(r.instructions)}</p>
        </div>
        ${(canEdit || canDelete) ? `<div style="text-align:right; margin-top:10px; display:flex; gap:8px; justify-content:flex-end;">
          ${canEdit ? `<button class="btn ghost small" onclick="startEditRecipe('${r.id}')">Bewerk</button>` : ''}
          ${canDelete ? `<button class="btn ghost small" onclick="deleteRecipe('${r.id}')">Verwijder</button>` : ''}
        </div>` : ''}
      </div>`;
    }).join('')}
  `;
}

window.setRecipeSearch = function(v){
  recipeSearchQuery = v;
  const el = document.getElementById('recipeSearchInput');
  const pos = el ? el.selectionStart : null;
  render();
  const newEl = document.getElementById('recipeSearchInput');
  if(newEl){ newEl.focus(); if(pos!==null) newEl.setSelectionRange(pos,pos); }
};

window.handleAddRecipe = async function(e){
  e.preventDefault();
  const title = document.getElementById('recTitle').value.trim();
  const ingredients = document.getElementById('recIngredients').value.trim();
  const instructions = document.getElementById('recInstructions').value.trim();
  if(!title || !ingredients || !instructions) return;
  const { error } = await sb.from('recipes').insert({
    author_id: profile.id, author_name: profile.name, title, ingredients, instructions
  });
  if(error){ showToast('Delen mislukt: ' + error.message); return; }
  await loadRecipes();
  render();
  showToast('Recept gedeeld!');
};

window.startEditRecipe = function(id){
  editingRecipeId = id;
  render();
};
window.cancelEditRecipe = function(){
  editingRecipeId = null;
  render();
};
window.handleUpdateRecipe = async function(e, id){
  e.preventDefault();
  const title = document.getElementById(`editTitle-${id}`).value.trim();
  const ingredients = document.getElementById(`editIngredients-${id}`).value.trim();
  const instructions = document.getElementById(`editInstructions-${id}`).value.trim();
  if(!title || !ingredients || !instructions) return;
  const { error } = await sb.from('recipes').update({ title, ingredients, instructions }).eq('id', id);
  if(error){ showToast('Opslaan mislukt: ' + error.message); return; }
  editingRecipeId = null;
  await loadRecipes();
  render();
  showToast('Recept bijgewerkt.');
};

window.deleteRecipe = async function(id){
  await sb.from('recipes').delete().eq('id', id);
  await loadRecipes();
  render();
};

window.handleAddPayment = async function(e, memberId){
  e.preventDefault();
  const date = document.getElementById('payDate').value || todayStr();
  const amountRaw = document.getElementById('payAmount').value;
  const sessionsRaw = document.getElementById('paySessions').value;
  const note = document.getElementById('payNote').value.trim();
  const amount = amountRaw ? parseFloat(amountRaw) : null;
  const sessions_included = sessionsRaw ? parseInt(sessionsRaw) : null;
  if(amount === null && sessions_included === null){ showToast('Vul een bedrag of aantal beurten in.'); return; }
  const { error } = await sb.from('payments').insert({ member_id: memberId, date, amount, sessions_included, note });
  if(error){ showToast('Registreren mislukt: ' + error.message); return; }
  await loadPayments(memberId);
  render();
  showToast('Betaling geregistreerd.');
};

window.deletePayment = async function(memberId, paymentId){
  await sb.from('payments').delete().eq('id', paymentId);
  await loadPayments(memberId);
  render();
};

window.exportMembersOverviewCSV = function(){
  const today = todayStr();
  const rows = [['Naam','E-mail','Beurten opgenomen','Beurten betaald','Saldo','Laatste betaling']];
  members.filter(m=>m.role==='member').forEach(m => {
    const attended = classes.filter(c => isClassPast(c) && (allSignups[c.id]||[]).includes(m.id) && wasAttended(c.id, m.id)).length;
    const memberPayments = allPayments.filter(p => p.member_id === m.id);
    const totalPaid = memberPayments.reduce((s,p)=> s + (p.sessions_included||0), 0);
    const balance = totalPaid > 0 ? totalPaid - attended : '';
    const lastPayment = memberPayments.sort((a,b)=> b.date.localeCompare(a.date))[0];
    rows.push([m.name, m.email, attended, totalPaid||'', balance, lastPayment?formatDate(lastPayment.date):'']);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ledenoverzicht-${today}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

function renderPaymentsOverview(){
  const today = todayStr();
  const rows = members.filter(m => m.role === 'member').map(m => {
    const attended = classes.filter(c => isClassPast(c) && (allSignups[c.id]||[]).includes(m.id) && wasAttended(c.id, m.id)).length;
    const memberPayments = allPayments.filter(p => p.member_id === m.id);
    const totalPaid = memberPayments.reduce((s,p)=> s + (p.sessions_included||0), 0);
    const balance = totalPaid > 0 ? totalPaid - attended : null;
    const lastPayment = memberPayments.sort((a,b)=> b.date.localeCompare(a.date))[0];
    return { member: m, attended, totalPaid, balance, lastPayment };
  });

  return `
    <h2 class="section-title">Lidgeld</h2>
    <div class="section-sub">Overzicht van opgenomen beurten versus betaalde beurten per lid. Klik op een lid voor details en om een betaling te registreren.</div>
    ${rows.length > 0 ? `<div style="margin-bottom:16px;"><button class="btn ghost small" onclick="exportMembersOverviewCSV()">Exporteer volledig overzicht (CSV)</button></div>` : ''}
    ${rows.length === 0 ? `<div class="empty">Nog geen leden.</div>` : `
    <div class="card">
      <table>
        <tr><th>Lid</th><th>Beurten opgenomen</th><th>Beurten betaald</th><th>Saldo</th><th>Laatste betaling</th></tr>
        ${rows.map(r => `
          <tr style="cursor:pointer;" onclick="openMember('${r.member.id}')">
            <td>${escapeHtml(r.member.name)}</td>
            <td class="mono">${r.attended}</td>
            <td class="mono">${r.totalPaid || '–'}</td>
            <td class="mono" style="color:${r.balance!==null && r.balance<0 ? 'var(--red)':'inherit'};">${r.balance!==null ? r.balance : '–'}</td>
            <td>${r.lastPayment ? formatDate(r.lastPayment.date) : '–'}</td>
          </tr>`).join('')}
      </table>
    </div>`}
  `;
}

function renderInfo(isTrainer){
  return `
    <h2 class="section-title">Info</h2>
    <div class="section-sub">Tips, aankondigingen en extra informatie.</div>
    ${isTrainer ? `
    <div class="card" style="margin-bottom:24px;">
      <h3 style="margin-bottom:14px;">Nieuw bericht plaatsen</h3>
      <form onsubmit="handleAddInfo(event)">
        <div class="field"><label>Titel</label><input id="infoTitle" type="text" required></div>
        <div class="field"><label>Tekst</label><textarea id="infoBody" rows="4" required></textarea></div>
        <button class="btn" type="submit">Plaatsen</button>
      </form>
    </div>` : ''}
    ${infoPosts.length === 0 ? `<div class="empty">Nog geen berichten geplaatst.</div>` : infoPosts.map(i => `
      <div class="info-post">
        <h3>${escapeHtml(i.title)}</h3>
        <div class="date">${formatDate(i.date)}</div>
        <p>${escapeHtml(i.body)}</p>
        ${isTrainer ? `<div style="text-align:right; margin-top:10px;"><button class="btn ghost small" onclick="deleteInfo('${i.id}')">Verwijder</button></div>` : ''}
      </div>
    `).join('')}
  `;
}

function renderProfile(){
  const isTrainer = profile.role === 'trainer';
  const bySelf = {};
  mySignups.forEach(cid => bySelf[cid] = [profile.id]);
  const streak = !isTrainer ? computeStreak(profile.id, classes, bySelf, wasAttended) : 0;

  const myAttended = !isTrainer ? classes.filter(c => isClassPast(c) && mySignups.includes(c.id) && wasAttended(c.id, profile.id)).length : 0;
  const myTotalPaid = !isTrainer ? payments.reduce((s,p)=> s + (p.sessions_included||0), 0) : 0;
  const myBalance = myTotalPaid > 0 ? myTotalPaid - myAttended : null;

  return `
    <h2 class="section-title">Mijn profiel</h2>
    <div class="section-sub">Beheer je naam, geboortedatum, e-mailadres en wachtwoord.${streak > 0 ? ` · 🔥 ${streak} ${streak===1?'week':'weken'} op rij actief` : ''}</div>

    <div class="card" style="max-width:480px; margin-bottom:20px;">
      <div style="display:flex; align-items:center; gap:16px; margin-bottom:14px;">
        ${avatarFor(profile, 64)}
        <div style="flex:1 1 auto;">
          <h3 style="margin:0 0 4px;">Jouw avatar</h3>
          <div class="hint" style="margin:0;">Stel je figuurtje samen of laat het verrassen.</div>
        </div>
        <button class="btn ghost small" onclick="rerollAvatar()">Verras me</button>
      </div>
      ${renderAvatarEditor()}
    </div>

    ${!isTrainer ? `
    <div class="card" style="max-width:480px; margin-bottom:20px;">
      <h3 style="margin-bottom:6px;">Mijn badges (${myBadges.length}/${BADGE_CATALOG.length})</h3>
      <div class="hint" style="margin-top:0; margin-bottom:14px;">Verdien badges door lessen te volgen, te testen, en mee te doen in groepen. Grijze badges kun je nog ontgrendelen. Sommige zijn geheim — een verrassing tot je ze vindt.</div>
      ${['Aanwezigheid','Testbatterij','Community','Recepten','Persoonlijk','Mijlpaal','Geheim'].map(catName => {
        const inCat = BADGE_CATALOG.filter(b => b.cat === catName);
        if(!inCat.length) return '';
        return `
          <div style="margin-bottom:16px;">
            <div class="badge-cat-header">${catName}</div>
            <div class="badge-grid">
              ${inCat.map(b => {
                const earned = myBadges.includes(b.code);
                const hide = b.secret && !earned;
                return `<div class="badge-tile ${earned?'earned':'locked'} tier-${b.tier}" title="${hide ? 'Geheime badge — ontgrendel om te onthullen' : escapeHtml(b.desc)}">
                  <div class="badge-emoji">${hide ? '❓' : b.emoji}</div>
                  <div class="badge-title">${hide ? '???' : escapeHtml(b.title)}</div>
                  <div class="badge-tierlabel">${hide ? 'geheim' : b.tier}</div>
                </div>`;
              }).join('')}
            </div>
          </div>`;
      }).join('')}
    </div>` : ''}

    ${!isTrainer ? `
    <div class="card" style="max-width:480px; margin-bottom:20px;">
      <h3 style="margin-bottom:14px;">Mijn beurten &amp; lidgeld</h3>
      <div class="grid cols-3" style="margin-bottom:14px;">
        <div class="stat-card"><div class="num">${myAttended}</div><div class="lbl">Opgenomen</div></div>
        <div class="stat-card"><div class="num">${myTotalPaid || '–'}</div><div class="lbl">Betaald</div></div>
        <div class="stat-card"><div class="num" style="color:${myBalance!==null && myBalance<0 ? 'var(--red)' : 'var(--amber)'};">${myBalance!==null ? myBalance : '–'}</div><div class="lbl">Saldo</div></div>
      </div>
      ${payments.length === 0 ? `<div class="hint" style="margin-top:0;">Nog geen betalingen geregistreerd door je trainer.</div>` : `
      <table>
        <tr><th>Datum</th><th>Bedrag</th><th>Beurten</th></tr>
        ${payments.map(p => `<tr><td>${formatDate(p.date)}</td><td class="mono">${p.amount!=null?'€'+parseFloat(p.amount).toFixed(2):'–'}</td><td class="mono">${p.sessions_included ?? '–'}</td></tr>`).join('')}
      </table>`}
    </div>` : ''}

    <div class="card" style="max-width:480px; margin-bottom:20px;">
      <h3 style="margin-bottom:14px;">Nodig een vriend uit</h3>
      ${profile.referral_code ? `
      <div class="hint" style="margin-top:0; margin-bottom:10px;">Deel deze link — wie zich hiermee aanmeldt, koppelen we automatisch aan jouw naam.</div>
      <div class="inline-form">
        <div class="field" style="flex:1; min-width:200px;"><input id="referralLinkField" type="text" readonly value="${window.location.origin}${window.location.pathname}?ref=${escapeHtml(profile.referral_code)}"></div>
        <button class="btn ghost small" onclick="copyReferralLink()">Kopieer link</button>
      </div>` : `
      <button class="btn ghost small" onclick="ensureReferralCode()">Genereer mijn uitnodigingslink</button>`}
    </div>

    <div class="card" style="max-width:480px; margin-bottom:20px;">
      <h3 style="margin-bottom:14px;">Naam &amp; geboortedatum</h3>
      <form onsubmit="handleUpdateName(event)">
        <div class="field"><label>Naam</label><input id="profName" type="text" value="${escapeHtml(profile.name)}" required></div>
        <div class="field"><label>Geboortedatum (optioneel)</label><input id="profBirthdate" type="date" value="${profile.birth_date || ''}"></div>
        <button class="btn" type="submit">Opslaan</button>
      </form>
    </div>

    <div class="card" style="max-width:480px; margin-bottom:20px;">
      <h3 style="margin-bottom:14px;">E-mailadres</h3>
      <form onsubmit="handleUpdateEmail(event)">
        <div class="field"><input id="profEmail" type="email" value="${escapeHtml(session.user.email)}" required></div>
        <div class="hint" style="margin-top:-6px; margin-bottom:12px;">Bij wijziging ontvang je een bevestigingsmail op het nieuwe adres.</div>
        <button class="btn ghost" type="submit">E-mailadres wijzigen</button>
      </form>
    </div>

    <div class="card" style="max-width:480px;">
      <h3 style="margin-bottom:14px;">Wachtwoord wijzigen</h3>
      <form onsubmit="handleUpdatePasswordDirect(event)">
        <div class="field"><label>Nieuw wachtwoord</label><input id="profPassword" type="password" minlength="6" required></div>
        <div class="field"><label>Herhaal wachtwoord</label><input id="profPassword2" type="password" minlength="6" required></div>
        <button class="btn ghost" type="submit">Wachtwoord wijzigen</button>
      </form>
    </div>
  `;
}

window.copyReferralLink = function(){
  const field = document.getElementById('referralLinkField');
  field.select();
  navigator.clipboard?.writeText(field.value).then(()=> showToast('Link gekopieerd!')).catch(()=> showToast('Kopiëren mislukt — selecteer en kopieer manueel.'));
};

window.ensureReferralCode = async function(){
  const code = genReferralCode();
  const { data, error } = await sb.from('profiles').update({ referral_code: code }).eq('id', profile.id).select().single();
  if(error){ showToast('Aanmaken link mislukt: ' + error.message); return; }
  profile = data;
  render();
};

window.handleUpdateName = async function(e){
  e.preventDefault();
  const name = document.getElementById('profName').value.trim();
  const birth_date = document.getElementById('profBirthdate').value || null;
  if(!name) return;
  const { data, error } = await sb.from('profiles').update({ name, birth_date }).eq('id', profile.id).select().single();
  if(error){ showToast('Opslaan mislukt: ' + error.message); return; }
  profile = data;
  render();
  showToast('Opgeslagen.');
};

window.handleUpdateEmail = async function(e){
  e.preventDefault();
  const email = document.getElementById('profEmail').value.trim();
  if(!email || email === session.user.email) return;
  const { error } = await sb.auth.updateUser(
    { email },
    { emailRedirectTo: window.location.origin + window.location.pathname }
  );
  if(error){ showToast('Wijzigen mislukt: ' + error.message); return; }
  showToast('Bevestigingsmail verstuurd naar het nieuwe adres.');
};

window.handleUpdatePasswordDirect = async function(e){
  e.preventDefault();
  const password = document.getElementById('profPassword').value;
  const password2 = document.getElementById('profPassword2').value;
  if(password.length < 6){ showToast('Wachtwoord moet minstens 6 tekens bevatten.'); return; }
  if(password !== password2){ showToast('De twee wachtwoorden komen niet overeen.'); return; }
  const { error } = await sb.auth.updateUser({ password });
  if(error){ showToast('Wijzigen mislukt: ' + error.message); return; }
  document.getElementById('profPassword').value = '';
  document.getElementById('profPassword2').value = '';
  showToast('Wachtwoord succesvol gewijzigd.');
};

function renderSettings(){
  return `
    <h2 class="section-title">Instellingen</h2>
    <div class="section-sub">Pas de naam en tagline van je studio aan.</div>
    <div class="card" style="max-width:480px; margin-bottom:20px;">
      <form onsubmit="handleSettingsSave(event)">
        <div class="field"><label>Studionaam</label><input id="setStudioName" type="text" value="${escapeHtml(settings.studio_name)}" required></div>
        <div class="field"><label>Tagline (op inlogscherm)</label><input id="setTagline" type="text" value="${escapeHtml(settings.tagline||'')}" placeholder="Bijv. Sterker worden, samen."></div>

        <div class="hint" style="margin-top:16px; margin-bottom:6px;">🎯 Maandchallenge (overzicht van iedereen)</div>
        <div class="field"><label>Titel</label><input id="setChallengeTitle" type="text" value="${escapeHtml(settings.challenge_title||'')}" placeholder="Bijv. Samen sterk in juli"></div>
        <div class="field"><label>Doel (aantal)</label><input id="setChallengeTarget" type="number" min="0" value="${settings.challenge_target||''}" placeholder="Bijv. 400"></div>
        <div class="field"><label>Eenheid</label><input id="setChallengeUnit" type="text" value="${escapeHtml(settings.challenge_unit||'lessen samen')}" placeholder="Bijv. lessen samen"></div>
        <div class="hint" style="margin-top:0; margin-bottom:14px;">Laat titel/doel leeg om terug te vallen op de automatische berekening (${(monthChallengeAuto()||{}).target||'—'} lessen deze maand, obv. ledenaantal).</div>

        <button class="btn" type="submit">Opslaan</button>
      </form>
    </div>
  `;
}

init();
</script>
</body>
</html>
